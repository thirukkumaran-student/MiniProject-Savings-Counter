<!DOCTYPE html>
<html lang = en>
    <head>
        <meta charset="UTF-8">
        <meta name = 'viewport' content = 'width=device-width, initial-scale= 1.0'>
        <title>Savings Counter - Sample Project</title>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js"></script>
    </head>

    <body>
        <div id = 'box'>
            <header><h1>Savings Counter - Save a day</h1></header>
            
            <span id = 'input'><label for="saving"><h3 class = 'caption'>Add Money   </h3></label><input type="number" name="saving" id="saving" min="10"></span>
            <button id = 'submit'>Submit</button>
            <h3 class = 'caption'>Total Savings:  </h3><h2 class = 'value'>0</h2>
            <h3 class = 'caption'>Highest Saved So Far: </h3><h2 class = 'value'>0</h2>
            <button type="reset" id = 'reset'>Reset</button> <button id = 'decrease'>Decrease</button>
        </div>
    </body>
</html>
